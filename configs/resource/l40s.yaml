name: l40s
gpu_gate:
  min_free_mib: 35000
  max_unrelated_process_mib: 10000
hf_ehr:
  batch_size: 128
  tokenize_batch_size: 1024
  meds_reader_threads: 4
  autocast: true
  autocast_dtype: bfloat16
mamba:
  batch_size: 128
  autocast: true
  autocast_dtype: bfloat16
kernel_build:
  max_jobs: 8
  cuda_home: ${oc.env:CUDA_HOME,/usr/local/cuda}
  torch_cuda_arch_list: "8.9"
